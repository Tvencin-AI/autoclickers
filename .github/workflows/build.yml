name: Build AutoClicker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./AutoClicker/gradlew

      - name: Build Release APK
        working-directory: ./AutoClicker
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-APK
          path: AutoClicker/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
